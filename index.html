<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>理事会運営ポータル</title>

<!-- ▼▼▼ ここだけ確認：自分のWebアプリURL（末尾 /exec）に必ず書き換える ▼▼▼ -->
<script>
  var APP_URL = "https://script.google.com/macros/s/AKfycbzCdamCvBWXd177j0ilktnmn_eCHKQ4l_XsHWWm4Tn_gHzgn5qjU_kVM2A50EakpKzIbw/exec";
</script>
<!-- ▲▲▲ ここだけ確認 ▲▲▲ -->

<!-- ホーム画面アイコン（建物） -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<meta name="theme-color" content="#2b211a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="理事会ポータル">
<meta name="mobile-web-app-capable" content="yes">

<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;gap:16px;text-align:center;
    background:radial-gradient(120% 120% at 50% 18%,#3d2e20,#1c140e 70%);
    color:#f3e9d6;font-family:'Hiragino Kaku Gothic ProN',Meiryo,system-ui,sans-serif;
    padding:26px 24px}
  img.logo{width:122px;height:122px;border-radius:26px;box-shadow:0 14px 40px rgba(0,0,0,.55);
    border:1px solid rgba(176,141,79,.5)}
  .eyebrow{font-size:11px;letter-spacing:.24em;color:#b08d4f}
  h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.08em;
    font-family:'Yu Mincho','Shippori Mincho',serif}
  .org{font-size:12px;color:#b08d4f;letter-spacing:.04em}
  .open{margin-top:8px;background:linear-gradient(135deg,#b08d4f,#8c6c34);color:#fff;border:0;
    border-radius:12px;padding:17px 44px;font-size:17px;font-weight:700;letter-spacing:.06em;
    cursor:pointer;box-shadow:0 8px 24px rgba(140,108,52,.4);text-decoration:none;
    display:inline-flex;align-items:center;gap:9px}
  .tip{font-size:12.5px;color:#cdbb98;line-height:1.85;max-width:340px;margin-top:4px;
    background:rgba(176,141,79,.12);border:1px solid rgba(176,141,79,.3);border-radius:12px;padding:13px 16px}
  .tip b{color:#f3e9d6}
  .spin{width:18px;height:18px;border:2px solid rgba(243,233,214,.4);border-top-color:#f3e9d6;
    border-radius:50%;animation:sp .8s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hidden{display:none}
</style>
</head>
<body>
  <img class="logo" src="icons/icon-512.png" alt="理事会運営ポータル">
  <div class="eyebrow">ASSOCIA TERRACE CHIKUSHINO</div>
  <h1>理事会運営ポータル</h1>
  <div class="org">アソシアテラス筑紫野管理組合　第13期</div>

  <!-- ホーム画面アイコンから起動した時用（自動で即アプリへ） -->
  <a class="open hidden" id="loadingBtn" href="#"><span class="spin"></span>ひらいています…</a>

  <!-- ブラウザで開いた時用（自動転送しない＝落ち着いてホーム追加できる） -->
  <a class="open hidden" id="openBtn" href="#">理事会ポータルを開く ➜</a>
  <div class="tip hidden" id="tip">
    📲 この画面を<b>ホーム画面に追加</b>すると、<b>マンションのアイコン</b>でいつでも開けます。<br>
    ブラウザの<b>メニュー（⋮）</b>→「<b>ホーム画面に追加 / インストール</b>」を選んでください。
  </div>

<script>
  (function(){
    var standalone = window.matchMedia('(display-mode: standalone)').matches
                  || window.navigator.standalone === true
                  || document.referrer.indexOf('android-app://') === 0;

    var loadingBtn = document.getElementById('loadingBtn');
    var openBtn    = document.getElementById('openBtn');
    var tip        = document.getElementById('tip');

    if (standalone) {
      // ホーム画面アイコン（インストール済み）から起動 → ほぼ即アプリへ
      loadingBtn.classList.remove('hidden');
      loadingBtn.setAttribute('href', APP_URL);
      loadingBtn.addEventListener('click', function(e){ e.preventDefault(); location.replace(APP_URL); });
      setTimeout(function(){ location.replace(APP_URL); }, 350);
    } else {
      // 通常のブラウザ表示 → 自動転送しない（ホーム追加を落ち着いてできるように）
      openBtn.classList.remove('hidden');
      tip.classList.remove('hidden');
      openBtn.setAttribute('href', APP_URL);
      openBtn.addEventListener('click', function(e){ e.preventDefault(); location.href = APP_URL; });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  })();
</script>
</body>
</html>
